<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiseSphere | Login</title>
<link rel="stylesheet" href="style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#00b4db);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#003366;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border:2px solid #00b4db;
}

button{
    width:100%;
    padding:13px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0059b3;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#003366;
    font-weight:bold;
}

.links a:hover{
    color:#00b4db;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Login</h1>

<p>Welcome to RiseSphere Portal</p>

<form action="dashboard.html">

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password" required>
</div>

<button type="submit">
Login
</button>

</form>

<div class="links">

<p>
Don't have an account?
<a href="register.html">Register Here</a>
</p>

<p>
<a href="index.html">← Back to Home</a>
</p>

</div>

</div>

</body>
</html>
