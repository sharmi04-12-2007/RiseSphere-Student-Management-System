<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiseSphere | Register</title>
<link rel="stylesheet" href="style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#00b4db);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:450px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#003366;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus,select:focus{
    border:2px solid #00b4db;
    outline:none;
}

button{
    width:100%;
    padding:13px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0059b3;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#003366;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    color:#00b4db;
}

.home-link{
    text-align:center;
    margin-top:10px;
}

.home-link a{
    color:#003366;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<p>Register to access RiseSphere Portal</p>

<form action="login.html">

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>
</div>

<div class="input-group">
<label>Register Number</label>
<input type="text" placeholder="Enter register number" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="Enter email address" required>
</div>

<div class="input-group">
<label>Department</label>
<select required>
<option value="">Select Department</option>
<option>BCA</option>
<option>BCA AI</option>
<option>B.Sc Computer Science</option>
<option>B.Com</option>
<option>BBA</option>
<option>MCA</option>
</select>
</div>

<div class="input-group">
<label>Year</label>
<select required>
<option value="">Select Year</option>
<option>I Year</option>
<option>II Year</option>
<option>III Year</option>
</select>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Create password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>
</div>

<button type="submit">
Register
</button>

</form>

<div class="login-link">
Already have an account?
<a href="login.html">Login Here</a>
</div>

<div class="home-link">
<a href="index.html">← Back to Home</a>
</div>

</div>

</body>
</html>
